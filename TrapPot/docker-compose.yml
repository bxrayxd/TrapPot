services:
  # 1. The Honeypot
  cowrie:
    image: cowrie/cowrie
    ports:
      - "2222:2222"
      - "2223:2223"
    volumes:
      - cowrie-logs:/cowrie/cowrie-git/var/log/cowrie
    networks:
      - trappot-net

  # 2. The Sensor (Zeek)
  zeek:
    image: blacktop/zeek
    network_mode: "service:cowrie" # Zeek sniffs cowrie's traffic directly
    volumes:
      - ./zeek/logs:/pcap
    command: -C -i eth0 local "Site::local_nets += { 172.16.0.0/12 }"

  # 3. The AI Brain
  ai_detector:
    build: 
      context: ./ai_detector
      network: host  # This tells it to use your Arch Linux internet directly
    volumes:
      - ./zeek/logs:/logs
      - ./cowrie/keys:/lib/cowrie/var/lib/cowrie/keys
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      - zeek
    networks:
      - trappot-net

  # 4. Log Storage
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - trappot-net

  # 5. Log Parser
  logstash:
    image: docker.elastic.co/logstash/logstash:9.4.0
    environment:
      - PIPELINE_ECS_COMPATIBILITY=disabled
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - cowrie-logs:/logs/cowrie:ro
      - ./zeek/logs:/logs/zeek:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
      cowrie:
        condition: service_started
      zeek:
        condition: service_started
    networks:
      - trappot-net

  # 6. Dashboard
  kibana:
    image: docker.elastic.co/kibana/kibana:9.4.0
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - trappot-net

networks:
  trappot-net:
    driver: bridge

volumes:
  cowrie-logs:
  elasticsearch-data:
