services:
  # 1. The Honeypot
  cowrie:
    image: cowrie/cowrie
    ports:
      - "2222:2222"
      - "2223:2223"
    volumes:
      - cowrie-logs:/cowrie/cowrie-git/var/log/cowrie
    networks:
      - trappot-net

  # 2. The Sensor (Zeek)
  zeek:
    image: blacktop/zeek
    network_mode: "service:cowrie" # Zeek sniffs cowrie's traffic directly
    volumes:
      - ./zeek/logs:/pcap
    command: -C -i eth0 local "Site::local_nets += { 172.16.0.0/12 }"

  # 3. The AI Brain
  ai_detector:
    build: 
      context: ./ai_detector
      network: host  # This tells it to use your Arch Linux internet directly
    volumes:
      - ./zeek/logs:/logs
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      - zeek
    networks:
      - trappot-net

  # 4. Log Storage
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - trappot-net

  # 5. Log Parser
  logstash:
    image: docker.elastic.co/logstash/logstash:9.4.0
    environment:
      - PIPELINE_ECS_COMPATIBILITY=disabled
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - cowrie-logs:/logs/cowrie:ro
      - ./zeek/logs:/logs/zeek:ro
    depends_on:
      elk_setup:
        condition: service_completed_successfully
      cowrie:
        condition: service_started
      zeek:
        condition: service_started
    networks:
      - trappot-net

  # 6. Dashboard
  kibana:
    image: docker.elastic.co/kibana/kibana:9.4.0
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - trappot-net

  # 7. ELK Setup
  elk_setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.0
    command:
      - /bin/sh
      - -ec
      - |
        curl -fsS -X PUT -H "Content-Type: application/json" http://elasticsearch:9200/_index_template/trappot-cowrie --data-binary @/setup/templates/trappot-cowrie.json
        curl -fsS -X PUT -H "Content-Type: application/json" http://elasticsearch:9200/_index_template/trappot-zeek-conn --data-binary @/setup/templates/trappot-zeek-conn.json
        curl -fsS -X PUT -H "Content-Type: application/json" http://elasticsearch:9200/_index_template/trappot-zeek-ssh --data-binary @/setup/templates/trappot-zeek-ssh.json
        until curl -fsS http://kibana:5601/api/status >/dev/null; do sleep 5; done
        curl -fsS -X POST -H "kbn-xsrf: true" -H "Content-Type: application/json" http://kibana:5601/api/data_views/data_view --data-binary @/setup/kibana/cowrie-data-view.json
        curl -fsS -X POST -H "kbn-xsrf: true" -H "Content-Type: application/json" http://kibana:5601/api/data_views/data_view --data-binary @/setup/kibana/zeek-conn-data-view.json
        curl -fsS -X POST -H "kbn-xsrf: true" -H "Content-Type: application/json" http://kibana:5601/api/data_views/data_view --data-binary @/setup/kibana/zeek-ssh-data-view.json
        curl -fsS -X POST -H "kbn-xsrf: true" -H "Content-Type: application/json" "http://kibana:5601/api/saved_objects/dashboard/trappot-overview?overwrite=true" --data-binary @/setup/kibana/trappot-dashboard.json
    volumes:
      - ./elasticsearch/templates:/setup/templates:ro
      - ./kibana:/setup/kibana:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
      kibana:
        condition: service_started
    networks:
      - trappot-net

networks:
  trappot-net:
    driver: bridge

volumes:
  cowrie-logs:
  elasticsearch-data:
