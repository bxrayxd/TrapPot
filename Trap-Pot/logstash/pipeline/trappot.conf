input {
  file {
    path => "/logs/cowrie/cowrie.json"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/cowrie.sincedb"
    codec => json
    add_field => { "trappot_source" => "cowrie" }
  }

  file {
    path => "/logs/zeek/conn.log"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/zeek-conn.sincedb"
    add_field => { "trappot_source" => "zeek_conn" }
  }

  file {
    path => "/logs/zeek/ssh.log"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/zeek-ssh.sincedb"
    add_field => { "trappot_source" => "zeek_ssh" }
  }

  file {
    path => "/logs/zeek/detections.json"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/detector.sincedb"
    codec => json
    add_field => { "trappot_source" => "detector" }
  }
}

filter {
  if [message] =~ /^#/ {
    drop { }
  }

  if [trappot_source] == "cowrie" {
    date {
      match => [ "timestamp", "ISO8601" ]
    }

    if [eventid] == "cowrie.login.failed" {
      mutate {
        add_field => { "attack_type" => "Brute force attempt" }
      }
    } else if [eventid] == "cowrie.login.success" {
      mutate {
        add_field => { "attack_type" => "Successful login" }
      }
    } else if [eventid] == "cowrie.command.input" {
      mutate {
        add_field => { "attack_type" => "Command execution" }
      }
    } else if [eventid] == "cowrie.session.file_upload" {
      mutate {
        add_field => { "attack_type" => "File upload" }
      }
    } else if [eventid] == "cowrie.session.connect" {
      mutate {
        add_field => { "attack_type" => "Session connection" }
      }
    }

    if [src_ip] {
      geoip {
        source => "src_ip"
        target => "geoip"
        tag_on_failure => []
      }
    }
  }

  if [trappot_source] == "zeek_conn" {
    csv {
      separator => "	"
      columns => [
        "ts",
        "uid",
        "id.orig_h",
        "id.orig_p",
        "id.resp_h",
        "id.resp_p",
        "proto",
        "service",
        "duration",
        "orig_bytes",
        "resp_bytes",
        "conn_state",
        "local_orig",
        "local_resp",
        "missed_bytes",
        "history",
        "orig_pkts",
        "orig_ip_bytes",
        "resp_pkts",
        "resp_ip_bytes",
        "tunnel_parents"
      ]
    }

    date {
      match => [ "ts", "UNIX" ]
    }

    mutate {
      gsub => [
        "id.orig_p", "^-$", "0",
        "id.resp_p", "^-$", "0",
        "duration", "^-$", "0",
        "orig_bytes", "^-$", "0",
        "resp_bytes", "^-$", "0",
        "missed_bytes", "^-$", "0",
        "orig_pkts", "^-$", "0",
        "orig_ip_bytes", "^-$", "0",
        "resp_pkts", "^-$", "0",
        "resp_ip_bytes", "^-$", "0"
      ]
    }

    mutate {
      convert => {
        "id.orig_p" => "integer"
        "id.resp_p" => "integer"
        "duration" => "float"
        "orig_bytes" => "integer"
        "resp_bytes" => "integer"
        "missed_bytes" => "integer"
        "orig_pkts" => "integer"
        "orig_ip_bytes" => "integer"
        "resp_pkts" => "integer"
        "resp_ip_bytes" => "integer"
      }
    }

    if [id.orig_h] {
      geoip {
        source => "id.orig_h"
        target => "geoip"
        tag_on_failure => []
      }
    }
  }

  if [trappot_source] == "zeek_ssh" {
    csv {
      separator => "	"
      columns => [
        "ts",
        "uid",
        "id.orig_h",
        "id.orig_p",
        "id.resp_h",
        "id.resp_p",
        "version",
        "auth_success",
        "auth_attempts",
        "direction",
        "client",
        "server",
        "cipher_alg",
        "mac_alg",
        "compression_alg",
        "kex_alg",
        "host_key_alg",
        "host_key",
        "remote_location.country_code",
        "remote_location.region",
        "remote_location.city",
        "remote_location.latitude",
        "remote_location.longitude"
      ]
    }

    date {
      match => [ "ts", "UNIX" ]
    }

    mutate {
      gsub => [
        "id.orig_p", "^-$", "0",
        "id.resp_p", "^-$", "0",
        "version", "^-$", "0",
        "auth_attempts", "^-$", "0"
      ]
    }

    mutate {
      convert => {
        "id.orig_p" => "integer"
        "id.resp_p" => "integer"
        "version" => "integer"
        "auth_attempts" => "integer"
      }
    }

    if [id.orig_h] {
      geoip {
        source => "id.orig_h"
        target => "geoip"
        tag_on_failure => []
      }
    }
  }

  if [trappot_source] == "detector" {
    date {
      match => [ "detected_at", "ISO8601" ]
    }

    mutate {
      convert => {
        "id.orig_p" => "integer"
        "id.resp_p" => "integer"
        "duration" => "float"
        "orig_bytes" => "integer"
        "resp_bytes" => "integer"
        "orig_pkts" => "integer"
        "orig_ip_bytes" => "integer"
        "resp_pkts" => "integer"
        "resp_ip_bytes" => "integer"
      }
    }
  }
}

output {
  if [trappot_source] == "cowrie" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      user => "${ELASTIC_USER}"
      password => "${ELASTIC_PASSWORD}"
      manage_template => false
      ilm_enabled => false
      index => "trappot-cowrie"
    }
  } else if [trappot_source] == "zeek_conn" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      user => "${ELASTIC_USER}"
      password => "${ELASTIC_PASSWORD}"
      manage_template => false
      ilm_enabled => false
      index => "trappot-zeek-conn"
    }
  } else if [trappot_source] == "zeek_ssh" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      user => "${ELASTIC_USER}"
      password => "${ELASTIC_PASSWORD}"
      manage_template => false
      ilm_enabled => false
      index => "trappot-zeek-ssh"
    }
  } else if [trappot_source] == "detector" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      user => "${ELASTIC_USER}"
      password => "${ELASTIC_PASSWORD}"
      manage_template => false
      ilm_enabled => false
      index => "trappot-detector"
    }
  }
}
