services:
  # 1. The Honeypot
  cowrie:
    image: cowrie/cowrie
    ports:
      - "2222:2222"
      - "2223:2223"
    volumes:
      - cowrie-logs:/cowrie/cowrie-git/var/log/cowrie
      - ./cowrie/etc/cowrie.cfg:/cowrie/cowrie-git/etc/cowrie.cfg:ro
      - ./cowrie/etc/userdb.txt:/cowrie/cowrie-git/etc/userdb.txt:ro
      - ./cowrie/honeyfs/etc/debian_version:/cowrie/cowrie-git/honeyfs/etc/debian_version:ro
      - ./cowrie/honeyfs/etc/group:/cowrie/cowrie-git/honeyfs/etc/group:ro
      - ./cowrie/honeyfs/etc/hostname:/cowrie/cowrie-git/honeyfs/etc/hostname:ro
      - ./cowrie/honeyfs/etc/hosts:/cowrie/cowrie-git/honeyfs/etc/hosts:ro
      - ./cowrie/honeyfs/etc/issue:/cowrie/cowrie-git/honeyfs/etc/issue:ro
      - ./cowrie/honeyfs/etc/issue.net:/cowrie/cowrie-git/honeyfs/etc/issue.net:ro
      - ./cowrie/honeyfs/etc/motd:/cowrie/cowrie-git/honeyfs/etc/motd:ro
      - ./cowrie/honeyfs/etc/os-release:/cowrie/cowrie-git/honeyfs/etc/os-release:ro
      - ./cowrie/honeyfs/etc/passwd:/cowrie/cowrie-git/honeyfs/etc/passwd:ro
      - ./cowrie/honeyfs/etc/shadow:/cowrie/cowrie-git/honeyfs/etc/shadow:ro
      - ./cowrie/honeyfs/proc/version:/cowrie/cowrie-git/honeyfs/proc/version:ro
    networks:
      - trappot-net

  # 2. The Sensor (Zeek)
  zeek:
    image: blacktop/zeek
    network_mode: "service:cowrie" # Zeek sniffs cowrie's traffic directly
    volumes:
      - ./zeek/logs:/pcap
    command: -C -i eth0 local "Site::local_nets += { 172.16.0.0/12 }"

  # 3. The AI Brain
  ai_detector:
    build: 
      context: ./ai_detector
      network: host  # This tells it to use your Arch Linux internet directly
    volumes:
      - ./zeek/logs:/logs
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      - zeek
    networks:
      - trappot-net

  # 4. Log Storage
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.enrollment.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:?Set ELASTIC_PASSWORD in Trap-Pot/.env}
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -u elastic:$${ELASTIC_PASSWORD} http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - trappot-net

  # 5. Log Parser
  logstash:
    image: docker.elastic.co/logstash/logstash:9.4.0
    environment:
      - PIPELINE_ECS_COMPATIBILITY=disabled
      - ELASTIC_USER=trappot_writer
      - ELASTIC_PASSWORD=${LOGSTASH_PASSWORD:?Set LOGSTASH_PASSWORD in Trap-Pot/.env}
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - cowrie-logs:/logs/cowrie:ro
      - ./zeek/logs:/logs/zeek:ro
    depends_on:
      elastic_setup:
        condition: service_completed_successfully
      cowrie:
        condition: service_started
      zeek:
        condition: service_started
    networks:
      - trappot-net

  # 6. Dashboard
  kibana:
    image: docker.elastic.co/kibana/kibana:9.4.0
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD:?Set KIBANA_PASSWORD in Trap-Pot/.env}
      - XPACK_SECURITY_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY:?Set KIBANA_ENCRYPTION_KEY in Trap-Pot/.env}
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY:?Set KIBANA_ENCRYPTION_KEY in Trap-Pot/.env}
      - XPACK_REPORTING_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY:?Set KIBANA_ENCRYPTION_KEY in Trap-Pot/.env}
    ports:
      - "5601:5601"
    depends_on:
      elastic_setup:
        condition: service_completed_successfully
    networks:
      - trappot-net

  # 7. Elasticsearch Setup
  elastic_setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.0
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:?Set ELASTIC_PASSWORD in Trap-Pot/.env}
      - KIBANA_PASSWORD=${KIBANA_PASSWORD:?Set KIBANA_PASSWORD in Trap-Pot/.env}
      - LOGSTASH_PASSWORD=${LOGSTASH_PASSWORD:?Set LOGSTASH_PASSWORD in Trap-Pot/.env}
    command:
      - /bin/sh
      - -ec
      - |
        until curl -fsS -u "elastic:$${ELASTIC_PASSWORD}" http://elasticsearch:9200/_security/_authenticate >/dev/null; do sleep 5; done
        curl -fsS -u "elastic:$${ELASTIC_PASSWORD}" -X POST -H "Content-Type: application/json" http://elasticsearch:9200/_security/user/kibana_system/_password -d "{\"password\":\"$${KIBANA_PASSWORD}\"}"
        curl -fsS -u "elastic:$${ELASTIC_PASSWORD}" -X PUT -H "Content-Type: application/json" http://elasticsearch:9200/_security/role/trappot_writer -d '{"cluster":["monitor"],"indices":[{"names":["trappot-*"],"privileges":["create_index","create","index","write","view_index_metadata"]}]}'
        curl -fsS -u "elastic:$${ELASTIC_PASSWORD}" -X PUT -H "Content-Type: application/json" http://elasticsearch:9200/_security/user/trappot_writer -d "{\"password\":\"$${LOGSTASH_PASSWORD}\",\"roles\":[\"trappot_writer\"],\"full_name\":\"TrapPot Logstash writer\"}"
        curl -fsS -u "elastic:$${ELASTIC_PASSWORD}" -X PUT -H "Content-Type: application/json" http://elasticsearch:9200/_index_template/trappot-cowrie --data-binary @/setup/templates/trappot-cowrie.json
        curl -fsS -u "elastic:$${ELASTIC_PASSWORD}" -X PUT -H "Content-Type: application/json" http://elasticsearch:9200/_index_template/trappot-zeek-conn --data-binary @/setup/templates/trappot-zeek-conn.json
        curl -fsS -u "elastic:$${ELASTIC_PASSWORD}" -X PUT -H "Content-Type: application/json" http://elasticsearch:9200/_index_template/trappot-zeek-ssh --data-binary @/setup/templates/trappot-zeek-ssh.json
        curl -fsS -u "elastic:$${ELASTIC_PASSWORD}" -X PUT -H "Content-Type: application/json" http://elasticsearch:9200/_index_template/trappot-detector --data-binary @/setup/templates/trappot-detector.json
    volumes:
      - ./elasticsearch/templates:/setup/templates:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - trappot-net

  # 8. Kibana Setup
  kibana_setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.0
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:?Set ELASTIC_PASSWORD in Trap-Pot/.env}
    command:
      - /bin/sh
      - -ec
      - |
        until curl -fsS -u "elastic:$${ELASTIC_PASSWORD}" http://kibana:5601/api/status >/dev/null 2>&1; do sleep 5; done
        curl -fsS -u "elastic:$${ELASTIC_PASSWORD}" -X POST -H "kbn-xsrf: true" -H "Content-Type: application/json" http://kibana:5601/api/data_views/data_view --data-binary @/setup/kibana/cowrie-data-view.json || true
        curl -fsS -u "elastic:$${ELASTIC_PASSWORD}" -X POST -H "kbn-xsrf: true" -H "Content-Type: application/json" http://kibana:5601/api/data_views/data_view --data-binary @/setup/kibana/zeek-conn-data-view.json || true
        curl -fsS -u "elastic:$${ELASTIC_PASSWORD}" -X POST -H "kbn-xsrf: true" -H "Content-Type: application/json" http://kibana:5601/api/data_views/data_view --data-binary @/setup/kibana/zeek-ssh-data-view.json || true
        curl -fsS -u "elastic:$${ELASTIC_PASSWORD}" -X POST -H "kbn-xsrf: true" -H "Content-Type: application/json" http://kibana:5601/api/data_views/data_view --data-binary @/setup/kibana/detector-data-view.json || true
        curl -fsS -u "elastic:$${ELASTIC_PASSWORD}" -X PUT -H "kbn-xsrf: true" -H "Content-Type: application/json" http://kibana:5601/api/dashboards/trappot-overview --data-binary @/setup/kibana/trappot-dashboard.json
    volumes:
      - ./kibana:/setup/kibana:ro
    depends_on:
      kibana:
        condition: service_started
    networks:
      - trappot-net

networks:
  trappot-net:
    driver: bridge

volumes:
  cowrie-logs:
  elasticsearch-data:
